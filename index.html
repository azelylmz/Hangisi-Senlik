<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangisi Şenlik? — Ürün karşılaştırma platformu</title>
<meta name="description" content="Hangisini alacağına saatler harcama. Kullanıcı yorumları, özellik ve fiyat analizinden sonra fiyatına gerçekten değen ürünleri buluyoruz.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#061D3A;--navy-soft:#4A5A6E;--teal:#10B98F;--teal-dark:#0E9E7A;
    --cream:#F3F0E6;--card:#FBFAF5;--line:#E6E2D6;--amber:#F2B705;
    --shadow:0 1px 0 rgba(6,29,58,.03),0 16px 34px -20px rgba(6,29,58,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--cream);color:var(--navy);font-family:"Montserrat",system-ui,sans-serif;font-size:17px;line-height:1.6;font-weight:500;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,h2,h3,h4{line-height:1.04;letter-spacing:-.01em;font-weight:800}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1100px;margin:0 auto;padding:0 24px}
  .teal{color:var(--teal)}.muted{color:var(--navy-soft)}

  .lock{display:flex;align-items:center;gap:11px;cursor:pointer}
  .lock .box{width:36px;height:36px;flex:none}
  .lock .wm{display:flex;flex-direction:column;line-height:.96;font-weight:800;font-size:17px}

  nav{position:sticky;top:0;z-index:60;background:rgba(243,240,230,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:68px;gap:16px}
  .nav-links{display:flex;align-items:center;gap:24px}
  .nav-links a{font-weight:700;font-size:14.5px;cursor:pointer}
  .nav-links a:hover{color:var(--teal)}
  .nav-cta{display:inline-flex;align-items:center;gap:8px;background:var(--teal);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;transition:transform .15s,background .15s}
  .nav-cta:hover{transform:translateY(-1px);background:var(--teal-dark)}
  @media(max-width:620px){.nav-links a:not(.nav-cta){display:none}}

  .ke{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12px;letter-spacing:.02em;text-transform:uppercase;padding:7px 13px;border-radius:999px;white-space:nowrap}
  .ke svg{width:14px;height:14px}
  .ke-al{background:var(--teal);color:#fff}.ke-fy{background:#fff;color:var(--teal);border:2px solid var(--teal)}
  .ke-bk{background:#fff;color:var(--navy);border:2px solid var(--navy)}.ke-alt{background:var(--amber);color:var(--navy)}

  .btn{display:inline-flex;align-items:center;gap:9px;padding:15px 24px;border-radius:999px;font-weight:700;font-size:15.5px;border:2px solid transparent;cursor:pointer;transition:transform .15s,background .15s,color .15s}
  .btn-pri{background:var(--navy);color:#fff}.btn-pri:hover{transform:translateY(-2px)}
  .btn-sec{background:transparent;color:var(--navy);border-color:var(--navy)}.btn-sec:hover{background:var(--navy);color:#fff}
  .btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal-dark);transform:translateY(-2px)}

  section{padding:60px 0}
  .sec-eyebrow{font-weight:800;font-size:12.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal)}
  h2{font-size:clamp(28px,5vw,46px);font-weight:900;text-transform:uppercase;margin-top:12px;letter-spacing:-.02em}
  .sec-head{max-width:48ch}.sec-head p{color:var(--navy-soft);margin-top:14px;font-weight:500}

  /* HERO */
  header{position:relative;padding:72px 0 50px;overflow:hidden}
  .blob{position:absolute;top:-220px;right:-160px;width:540px;height:540px;border-radius:50%;background:var(--teal);z-index:0}
  .dots{position:absolute;top:86px;right:58px;z-index:1;display:grid;grid-template-columns:repeat(7,10px);gap:13px}
  .dots i{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.7)}
  @media(max-width:760px){.blob{width:330px;height:330px;top:-150px;right:-120px}.dots{display:none}}
  .hero{position:relative;z-index:2;max-width:740px}
  .eyebrow{display:inline-block;font-weight:800;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);background:#fff;border:1px solid var(--line);padding:8px 15px;border-radius:999px}
  h1.head{font-size:clamp(38px,7.2vw,76px);font-weight:900;text-transform:uppercase;margin:22px 0 0;line-height:.97}
  .lead-strong{font-weight:800;font-size:clamp(18px,2.4vw,23px);margin-top:20px}
  .sub{font-size:clamp(16px,2.1vw,19px);color:var(--navy-soft);max-width:52ch;margin:12px 0 0}
  .sub b{color:var(--navy);font-weight:700}
  .stamp-line{color:var(--teal);font-weight:900;text-transform:uppercase;letter-spacing:.02em;font-size:clamp(15px,2vw,19px);margin-top:22px}
  .cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}

  /* two-layer */
  .layers{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:40px}
  @media(max-width:760px){.layers{grid-template-columns:1fr}}
  .layer{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow)}
  .layer .lh{display:flex;align-items:center;gap:10px;font-weight:800;font-size:13px;letter-spacing:.06em;text-transform:uppercase}
  .layer.l1 .lh{color:var(--navy)}.layer.l2 .lh{color:var(--teal)}
  .layer .lh .n{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:#fff;font-size:13px}
  .layer.l1 .lh .n{background:var(--navy)}.layer.l2 .lh .n{background:var(--teal)}
  .layer h3{font-size:20px;margin:14px 0 4px}.layer>p{color:var(--navy-soft);font-size:14.5px;margin-bottom:14px}
  .clist{list-style:none;display:flex;flex-direction:column;gap:9px}
  .clist li{display:flex;gap:9px;font-size:14.5px;font-weight:600;align-items:flex-start}
  .clist li svg{width:17px;height:17px;flex:none;margin-top:3px;color:var(--teal)}
  .clist li small{display:block;font-weight:500;color:var(--navy-soft);font-size:12.5px}

  .grid{display:grid;gap:16px;margin-top:38px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g-feed{grid-template-columns:repeat(auto-fit,minmax(248px,1fr))}
  .g-grp{grid-template-columns:repeat(3,1fr)}
  @media(max-width:900px){.g3,.g-grp{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.g3,.g-grp{grid-template-columns:1fr}}

  /* feed / comparison teaser */
  .cmp-card{display:block;background:var(--navy);color:#fff;border-radius:20px;padding:26px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
  .cmp-card:hover{transform:translateY(-3px)}
  .cmp-card .cb{position:absolute;top:-70px;right:-50px;width:190px;height:190px;border-radius:50%;background:var(--teal);opacity:.85}
  .cmp-card .ce{position:relative;z-index:2;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--teal)}
  .cmp-card h3{position:relative;z-index:2;font-size:21px;margin-top:8px;line-height:1.12}
  .cmp-card .go{position:relative;z-index:2;margin-top:16px;font-weight:800;color:#fff;display:inline-flex;gap:6px;font-size:14px}

  /* category groups */
  .group{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:var(--shadow)}
  .group-h{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .group-h .gi{width:44px;height:44px;border-radius:12px;background:var(--teal);display:grid;place-items:center;flex:none}
  .group-h .gi svg{width:24px;height:24px;color:#fff}
  .group-h h3{font-size:20px}
  .group ul{list-style:none;display:flex;flex-direction:column;gap:1px}
  .group li{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:10px;font-weight:600;font-size:14.5px}
  .group li .lead{width:15px;height:15px;flex:none;color:var(--teal)}
  .group li.soon{color:var(--navy-soft)}
  .group li.link{cursor:pointer}.group li.link:hover{background:#fff;color:var(--teal)}
  .group li .arr{margin-left:auto;font-weight:800;opacity:0;transition:.15s}
  .group li.link:hover .arr{opacity:1}
  .group li.head-active{font-weight:700;color:var(--navy)}

  .crumb{display:flex;gap:8px;align-items:center;font-size:13px;font-weight:700;color:var(--navy-soft);padding-top:36px}
  .crumb a{cursor:pointer}.crumb a:hover{color:var(--teal)}

  .crit-block{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:var(--shadow);margin-top:20px}
  .crit-block h4{font-size:14px;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:9px}
  .crit-block.special h4{color:var(--teal)}.crit-block.core h4{color:var(--navy)}
  .crit-tags{display:flex;flex-wrap:wrap;gap:10px}
  .crit-tag{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 15px;font-weight:700;font-size:14px}
  .crit-tag svg{width:18px;height:18px;color:var(--teal);flex:none}

  .prod{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:26px;box-shadow:var(--shadow);margin-top:18px}
  .prod-top{display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;align-items:flex-start}
  .prod-top .role{font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--navy-soft)}
  .prod-top h3{font-size:21px;margin-top:4px}
  .prod-top .price{font-weight:800;font-size:14px;color:var(--navy);margin-top:8px}
  .ratings{display:grid;grid-template-columns:1fr 1fr;gap:12px 26px;margin-top:22px}
  @media(max-width:560px){.ratings{grid-template-columns:1fr}}
  .rt .rl{display:flex;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:5px}
  .rt .rl span:last-child{font-weight:800}
  .bar{height:7px;border-radius:99px;background:#ECE8DC;overflow:hidden}
  .bar i{display:block;height:100%;border-radius:99px;background:var(--teal);width:0;transition:width .9s cubic-bezier(.2,.8,.2,1)}
  .bar.warn i{background:var(--amber)}
  .why{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:22px}
  @media(max-width:560px){.why{grid-template-columns:1fr}}
  .why div{background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px}
  .why h5{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--teal);margin-bottom:6px}
  .why p{font-size:14px;color:var(--navy-soft);font-weight:500}
  .disc{font-size:12.5px;color:var(--navy-soft);margin-top:22px;font-weight:500}

  .empty{background:var(--card);border:2px dashed var(--line);border-radius:18px;padding:38px;text-align:center;margin-top:24px}
  .empty h3{font-size:20px;margin-bottom:8px}.empty p{color:var(--navy-soft);font-weight:500;max-width:44ch;margin:0 auto}

  .cta-band{text-align:center;background:#fff;border:1px solid var(--line);border-radius:24px;padding:54px 40px;box-shadow:var(--shadow)}
  .cta-band p{color:var(--navy-soft);max-width:48ch;margin:16px auto 0;font-weight:500}
  .cta-band .btn-row{margin-top:26px;display:flex;justify-content:center;flex-wrap:wrap;gap:12px}

  footer{padding:42px 0 58px;border-top:1px solid var(--line);margin-top:20px}
  .foot-in{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:18px}
  .foot-tag{color:var(--navy-soft);font-weight:700;font-size:13.5px;letter-spacing:.04em}

  .fade{opacity:0;transform:translateY(18px);transition:opacity .6s,transform .6s}
  .fade.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.fade{opacity:1;transform:none}html{scroll-behavior:auto}}
</style>
</head>

const I = {
  insta:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>',

  bed:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 9v10M22 13v6M2 13h20M2 13a4 4 0 0 1 4-4h9a4 4 0 0 1 4 4"/></svg>',

  dot:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6"><path d="M5 12h14"/></svg>'
};

/* ===== KATMAN 1 — sabit omurga (her üründe) ===== */
const CORE = [
  ["Fiyat / performans + servis","Parasının karşılığı ve satış sonrası destek"],
  ["Kullanıcı yorumları & güvenilirlik","Gerçek kullanımda arıza ve dayanıklılık"],

/* ===== KATEGORİ SAYFALARI (kendi kriter setleriyle) ===== */
const CATS = {
  airfryer:{name:"Airfryer",grp:"Küçük Ev Aletleri",icon:I.airfryer,
    intro:"Litreye ya da watt'a bakıp karar verilmez. Asıl fark pişirme sonucu, hazne yapısı ve günlük kullanım kolaylığında ortaya çıkar.",

  kulaklik:{name:"Kablosuz Kulaklık",grp:"Teknoloji",icon:I.headphone,

  telefon:{name:"Telefon",grp:"Teknoloji",icon:I.phone,

  tv:{name:"Televizyon",grp:"Teknoloji",icon:I.tv,

  buzdolabi:{name:"Buzdolabı",grp:"Beyaz Eşya",icon:I.fridge,
    intro:"Litre tek başına yeterli değil. Soğutma teknolojisi, enerji sınıfı ve iç hacim düzeni gündelik kullanımı şekillendirir.",

};

/* ===== KATEGORİ KIRILIMLARI (gruplar) ===== */
const GROUPS = [
  {name:"Küçük Ev Aletleri",icon:I.airfryer,items:[
    {t:"Airfryer / Fritöz",cat:"airfryer"},{t:"Robot Süpürge",cat:"robot"},{t:"Dikey / Kablosuz Süpürge",cat:"diksupurge"},
    {t:"Kahve Makinesi (espresso / filtre)"},{t:"Çay Makinesi & Su Isıtıcı"},{t:"Blender & Mutfak Robotu"},
    {t:"El Blender / Mikser"},{t:"Tost & Izgara Makinesi"},{t:"Ütü & Buharlı Ütü"},{t:"Saç Kurutma & Şekillendirme"}

const FEED = [

  {kind:"internal",id:"airfryer-10000",tag:"Küçük Ev Aletleri",date:"Haziran 2026",title:"10.000 TL Bandında Airfryer"}
];
let LIVE_FEED = FEED;

/* Besleme: repo'daki feed.json'u okur, yoksa yukarıdaki FEED'e düşer */
async function loadFeed(){
  for(const u of ["feed.json"]){
    try{
      const r = await fetch(u,{cache:"no-store"});
      if(r.ok){const j=await r.json();const a=Array.isArray(j)?j:j.items;if(Array.isArray(a)&&a.length) return a;}
    }catch(e){}
  }
  return FEED;
}

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");}

function feedHtml(){
  return LIVE_FEED.map(it=>{
    const tag=esc(it.tag||(it.cat&&CATS[it.cat]?CATS[it.cat].name:""));
    const inner=`<div class="cb"></div><div class="ce">${tag}${it.date?" · "+esc(it.date):""}</div><h3>${esc(it.title)}</h3>`;
    if(it.kind==="internal") return `<div class="cmp-card fade" onclick="go('#/c/${it.id}')">${inner}<span class="go">Karşılaştırmayı aç →</span></div>`;
    return `<a class="cmp-card fade" href="${it.url}" target="_blank" rel="noopener">${inner}<span class="go">${I.insta} Instagram'da gör ↗</span></a>`;
  }).join("");
}

function groupsHtml(){
  return GROUPS.map(g=>{
    const items=g.items.map(it=>{
      if(it.cat&&CATS[it.cat]) return `<li class="link" onclick="go('#/k/${it.cat}')"><span class="lead">${I.check}</span>${esc(it.t)}<span class="arr">→</span></li>`;
      return `<li class="soon"><span class="lead">${I.dot}</span>${esc(it.t)}</li>`;
    }).join("");
    return `<div class="group fade"><div class="group-h"><div class="gi">${g.icon}</div><h3>${esc(g.name)}</h3></div><ul>${items}</ul></div>`;
  }).join("");
}

function compView(id){
  const c=COMPS[id]; if(!c) return notFound();

function notFound(){return `<section><div class="wrap" style="padding-top:40px"><div class="empty"><h3>Sayfa bulunamadı</h3><p>Aradığın şey taşınmış olabilir.</p><div style="margin-top:18px"><a class="btn btn-teal" onclick="go('#/')">Ana sayfaya dön</a></div></div></div></section>`;}

function ctaBand(){return `<section><div class="wrap"><div class="cta-band fade">
  <h2>Kararsız mısın?<br><span class="teal">Almadan önce bak.</span></h2>
  <p>Her hafta yeni karşılaştırmalar Instagram'da. Markaysan ve ürününü aynı tarafsız sistemde görmek istiyorsan DM kapımız açık.</p>

</div></div></section>`;}

function go(hash){location.hash=hash;}
function render(){
  const h=location.hash||"#/";const app=document.getElementById("app");let html;
  if(h==="#/"||h==="") html=homeView();
  else if(h==="#/kategoriler") html=catsView();
  else if(h.startsWith("#/k/")) html=catView(h.slice(4));
  else if(h.startsWith("#/c/")) html=compView(h.slice(4));
  else html=notFound();
  app.innerHTML=html;window.scrollTo({top:0,behavior:"auto"});
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");e.target.querySelectorAll(".bar i").forEach(b=>b.style.width=b.dataset.w+"%");io.unobserve(e.target);}});},{threshold:.1});
  app.querySelectorAll(".fade").forEach(el=>io.observe(el));
}
window.addEventListener("hashchange",render);
render();
loadFeed().then(f=>{LIVE_FEED=f;const h=location.hash||"#/";if(h==="#/"||h==="") render();});
</script>
